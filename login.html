<!DOCTYPE html>
<html>
<head>
    <title>KPRCAS Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .login-box {
            width: 300px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #004c99;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="kprcas-logo.png" alt="KPRCAS Logo" class="logo">

        <h2>KPRCAS Login</h2>

        <form>
            <input type="text" placeholder="Username" required><br>
            <input type="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
